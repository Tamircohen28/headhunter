name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.5.0)'
        required: true

jobs:
  release:
    name: Create release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '20'

      - name: Validate version format
        run: |
          echo "${{ github.event.inputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$' \
            || (echo "Version must be semver (e.g. 1.5.0)" && exit 1)

      - name: Run tests before tagging
        run: bash scripts/test.sh

      - name: Bump version in plugin.json
        run: |
          jq --arg v "${{ github.event.inputs.version }}" '.version = $v' \
            .claude-plugin/plugin.json > /tmp/plugin.json
          mv /tmp/plugin.json .claude-plugin/plugin.json

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/plugin.json
          if git diff --cached --quiet; then
            echo "No manifest changes (already at ${{ github.event.inputs.version }}) — skipping commit"
          else
            git commit -m "chore(release): bump version to ${{ github.event.inputs.version }}"
            git push
          fi

      - name: Create and push tag
        run: |
          git tag "v${{ github.event.inputs.version }}"
          git push origin "v${{ github.event.inputs.version }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ github.event.inputs.version }}" \
            --title "v${{ github.event.inputs.version }}" \
            --notes "See [CHANGELOG.md](CHANGELOG.md) for details." \
            --verify-tag
