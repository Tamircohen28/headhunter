name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '20'
      - name: Check JS syntax
        run: |
          for f in scripts/*.js; do node --check "$f"; done
      - name: Shell lint
        run: |
          sudo apt-get install -y shellcheck
          shellcheck scripts/*.sh

  agent-check:
    name: Agent check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '20'
      - name: Validate agent surface
        run: bash scripts/agent-check.sh
      - name: Check agent drift
        run: bash scripts/check-agent-drift.sh
      - name: Check feature equivalence
        run: bash scripts/check-feature-equivalence.sh
      - name: Check platform targets
        run: bash scripts/check-platform-targets.sh

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '20'
      - name: Run self-test suite
        run: bash scripts/test.sh

  manifest-version-alignment:
    name: Manifest/tag version alignment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - run: bash scripts/check-manifest-version-alignment.sh .

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Scan for leaked secrets
        run: |
          set +e
          FOUND=0
          grep -rPn \
            -e 'sk-[A-Za-z0-9]{20,}' \
            -e 'AIza[A-Za-z0-9_-]{35}' \
            -e 'AKIA[A-Z0-9]{16}' \
            -e 'ghp_[A-Za-z0-9]{36}' \
            -e 'github_pat_[A-Za-z0-9_]{82}' \
            -e 'xoxb-[0-9]+-' \
            --include='*.js' --include='*.sh' --include='*.json' \
            --exclude-dir='.git' \
            --exclude='*.example' \
            . && FOUND=1
          if [ $FOUND -eq 1 ]; then
            echo "Potential secret detected. Review the matches above."
            exit 1
          fi
          echo "No secrets found."

  ci:
    name: CI
    runs-on: ubuntu-latest
    needs: [lint, agent-check, test, manifest-version-alignment, secret-scan]
    steps:
      - run: echo "All checks passed"
