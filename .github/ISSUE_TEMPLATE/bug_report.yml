name: Bug report
description: Something isn't working as expected
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as you can.

  - type: input
    id: command
    attributes:
      label: Command or script
      description: Which slash command, script, or skill triggered the bug?
      placeholder: e.g. /headhunter:scan, node scripts/crud.js move
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug. Include the error message if there is one.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. node scripts/crud.js seed
        2. /headhunter:scan <url>
        3. See error
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: node --version
    validations:
      required: true

  - type: dropdown
    id: ai-host
    attributes:
      label: AI host
      options:
        - Claude Code
        - Cursor
        - OpenAI Codex CLI
        - Other
    validations:
      required: true
